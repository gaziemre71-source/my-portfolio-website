<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emre GOKTAS - Portfolio</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f0f11',
                        neonCyan: '#00f3ff',
                        neonPurple: '#bc13fe',
                        darkCard: '#1a1a1f',
                        brandLinkedin: '#0077b5',
                        brandGithub: '#ffffff',
                        brandYoutube: '#ff0000',
                        brandUpwork: '#14a800',
                        brandMedium: '#ffffff',
                        brandGmail: '#EA4335'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f0f11;
            /* darkBg */
            color: #e5e7eb;
        }

        /* Neon text glow utilities */
        .text-glow-cyan {
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
        }

        .text-glow-purple {
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.6);
        }

        .border-glow-cyan {
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
            border-color: #00f3ff;
        }

        /* Smooth transitions */
        .page-transition {
            transition: opacity 0.3s ease-in-out;
        }

        .htmx-swapping .page-transition {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .htmx-added .page-transition {
            opacity: 0;
        }
    </style>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"
        integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
        crossorigin="anonymous"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Global scripts -->
    <script>
        function projectsApp() {
            return {
                projects: [],
                loading: true,
                error: null,
                modalOpen: false,
                activeProject: null,
                mediaType: 'image',

                async init() {
                    try {
                        const response = await fetch('data/projects.json');
                        if (!response.ok) throw new Error('Projeler yüklenemedi.');
                        this.projects = await response.json();
                    } catch (err) {
                        this.error = err.message;
                        console.error("Fetch error: ", err);
                    } finally {
                        this.loading = false;
                    }
                },

                openModal(project) {
                    this.activeProject = project;
                    this.mediaType = 'image';
                    this.modalOpen = true;
                    // Prevent body scroll
                    document.body.style.overflow = 'hidden';
                },

                closeModal() {
                    this.modalOpen = false;
                    // Add short delay to clear active project so transitions finish smoothly
                    setTimeout(() => {
                        this.activeProject = null;
                    }, 300);
                    // Restore body scroll
                    document.body.style.overflow = '';
                }
            }
        }

        function blogLoader() {
            return {
                content: '<div class="text-center text-gray-500 py-20">Lütfen sol taraftan bir yazı seçin.</div>',
                loading: false,
                error: null,
                init() {
                    // Auto-load the first blog post when navigating to the blog page
                    this.loadMarkdown('blog/welcome.md');
                },
                async loadMarkdown(filepath) {
                    this.loading = true;
                    this.error = null;
                    try {
                        const response = await fetch(filepath);
                        if (!response.ok) {
                            throw new Error(`Makale yüklenemedi: ${response.status} ${response.statusText}`);
                        }
                        const markdownText = await response.text();

                        // Convert markdown to HTML using marked.js (included in index.html)
                        this.content = marked.parse(markdownText);
                    } catch (err) {
                        this.error = err.message;
                        this.content = '';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        function featuredApp() {
            return {
                featured: [],
                async init() {
                    try {
                        const res = await fetch(`data/projects.json?t=${new Date().getTime()}`);
                        if (!res.ok) throw new Error('Projeler yüklenemedi.');
                        const data = await res.json();
                        this.featured = data.slice(0, 3);
                    } catch (err) {
                        console.error("Fetch error: ", err);
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkBg text-gray-200 min-h-screen flex flex-col font-sans selection:bg-neonCyan selection:text-black">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 bg-darkBg/80 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="#"
                        class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonPurple"
                        hx-get="pages/home.html" hx-target="#main-content" hx-swap="innerHTML transition:true">
                        Emre<span class="text-white">GOKTAS</span>
                    </a>
                </div>

                <!-- Desktop Menu -->
                <nav class="hidden md:block">
                    <ul class="flex space-x-8 items-center">
                        <li><a href="#" hx-get="pages/home.html" hx-target="#main-content"
                                hx-swap="innerHTML transition:true"
                                class="hover:text-neonCyan transition-colors cursor-pointer text-sm font-semibold tracking-wider uppercase">Home</a>
                        </li>
                        <li><a href="#" hx-get="pages/about.html" hx-target="#main-content"
                                hx-swap="innerHTML transition:true"
                                class="hover:text-neonCyan transition-colors cursor-pointer text-sm font-semibold tracking-wider uppercase">About
                                Me</a></li>
                        <li><a href="#" hx-get="pages/projects.html" hx-target="#main-content"
                                hx-swap="innerHTML transition:true"
                                class="hover:text-neonCyan transition-colors cursor-pointer text-sm font-semibold tracking-wider uppercase">Projects</a>
                        </li>
                        <li><a href="#" hx-get="pages/blog.html" hx-target="#main-content"
                                hx-swap="innerHTML transition:true"
                                class="hover:text-neonCyan transition-colors cursor-pointer text-sm font-semibold tracking-wider uppercase">Blog</a>
                        </li>
                    </ul>
                </nav>

                <!-- Mobile Menu Button (Alpine) -->
                <div class="md:hidden" x-data="{ open: false }">
                    <button @click="open = !open" class="text-gray-300 hover:text-white focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path x-show="!open" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                            <path x-show="open" style="display: none;" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>

                    <!-- Mobile Menu Dropdown -->
                    <div x-show="open" @click.away="open = false" style="display: none;"
                        class="absolute top-16 left-0 w-full bg-darkCard border-b border-gray-800 shadow-xl p-4 flex flex-col space-y-4">
                        <a href="#" @click="open = false" hx-get="pages/home.html" hx-target="#main-content"
                            hx-swap="innerHTML transition:true"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Home</a>
                        <a href="#" @click="open = false" hx-get="pages/about.html" hx-target="#main-content"
                            hx-swap="innerHTML transition:true"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">About
                            Me</a>
                        <a href="#" @click="open = false" hx-get="pages/projects.html" hx-target="#main-content"
                            hx-swap="innerHTML transition:true"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Projects</a>
                        <a href="#" @click="open = false" hx-get="pages/blog.html" hx-target="#main-content"
                            hx-swap="innerHTML transition:true"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Blog</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area (SPA Target) -->
    <main id="main-content" class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10 page-transition"
        hx-get="pages/home.html" hx-trigger="load" hx-swap="innerHTML transition:true">
        <!-- Default loader -->
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-neonCyan"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-6 text-center text-sm text-gray-500">
        <p>&copy; <span x-data x-text="new Date().getFullYear()"></span> Emre GOKTAS. Built with HTMX, Alpine.js &
            Tailwind CSS.</p>
    </footer>

</body>

</html>
