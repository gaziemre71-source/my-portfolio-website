    <!-- Tailwind CSS (CDN) -->

            theme: {

                    colors: {
                        darkBg: '#0f0f11',

                        neonPurple: '#bc13fe',
                        darkCard: '#1a1a1f',
                        brandLinkedin: '#0077b5',
                        brandGithub: '#ffffff',
                        brandYoutube: '#ff0000',
                        brandUpwork: '#14a800',

                    },

    <style>
        body {
            background-color: #0f0f11;
            /* darkBg */
            color: #e5e7eb;
        }

        /* Neon text glow utilities */
        .text-glow-cyan {
            text-shadow: 0 0 8px rgba(0, 243, 255, 0.6);
        }

        .text-glow-purple {
            text-shadow: 0 0 8px rgba(188, 19, 254, 0.6);
        }

        .border-glow-cyan {
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
            border-color: #00f3ff;
        }

        /* Smooth transitions */
        .page-transition {
            transition: opacity 0.3s ease-in-out;
        }

        .htmx-swapping .page-transition {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }

        .htmx-added .page-transition {
            opacity: 0;
        }
    </style>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"
        integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
        crossorigin="anonymous"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Global scripts -->
    <script>
        function projectsApp() {
            return {
                projects: [],
                loading: true,
                error: null,
                modalOpen: false,
                activeProject: null,
                mediaType: 'image',

                async init() {
                    try {
                        const response = await fetch(`/projects/projects.json?t=${new Date().getTime()}`);
                        if (!response.ok) throw new Error('Projeler yüklenemedi.');
                        this.projects = await response.json();
                    } catch (err) {
                        this.error = err.message;
                        console.error("Fetch error: ", err);
                    } finally {
                        this.loading = false;
                    }
                },

                openModal(project) {
                    this.activeProject = project;
                    this.mediaType = 'image';
                    this.modalOpen = true;
                    // Prevent body scroll
                    document.body.style.overflow = 'hidden';
                },

                viewFullProject(id) {
                    // Force close immediately instead of using the multi-step closeModal()
                    this.modalOpen = false;
                    this.mediaType = 'image';
                    document.body.style.overflow = '';

                    // Small delay to clear active project so UI doesn't flicker before content swap
                    setTimeout(() => {
                        this.activeProject = null;
                    }, 100);

                    // Update hash for shareable link
                    window.history.pushState({}, '', `/project/${id}`);
                    handleRouting();
                },

                closeModal() {
                    if (this.mediaType !== 'image') {
                        this.mediaType = 'image';
                        return;
                    }

                    this.modalOpen = false;
                    // Add short delay to clear active project so transitions finish smoothly
                    setTimeout(() => {
                        this.activeProject = null;
                    }, 300);
                    // Restore body scroll
                    document.body.style.overflow = '';
                }
            }
        }

        function blogLoader() {
            return {
                content: '<div class="text-center text-gray-500 py-20">Lütfen sol taraftan bir yazı seçin.</div>',
                loading: false,
                error: null,
                blogList: [],
                activeFile: null,
                async init() {
                    try {
                        // Prevent JSON caching
                        const res = await fetch(`/blog/blogs.json?t=${new Date().getTime()}`);
                        if (res.ok) {
                            this.blogList = await res.json();
                        }
                    } catch (err) {
                        console.error("Failed to load blog list", err);
                    }

                    // Auto-load the first blog post if available
                    if (this.blogList.length > 0) {
                        this.loadMarkdown(this.blogList[0].file);
                    } else {
                        // Fallback
                        this.loadMarkdown('/blog/welcome.md');
                    }
                },
                async loadMarkdown(filepath) {
                    this.activeFile = filepath;
                    this.loading = true;
                    this.error = null;
                    try {
                        const response = await fetch(filepath);
                        if (!response.ok) {
                            throw new Error(`Makale yüklenemedi: ${response.status} ${response.statusText}`);
                        }
                        const markdownText = await response.text();

                        // Convert markdown to HTML using marked.js (included in index.html)
                        this.content = marked.parse(markdownText);
                    } catch (err) {
                        this.error = err.message;
                        this.content = '';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        function featuredApp() {
            return {
                featured: [],
                async init() {
                    try {
                        const res = await fetch(`/projects/projects.json?t=${new Date().getTime()}`);
                        if (!res.ok) throw new Error('Projeler yüklenemedi.');
                        const data = await res.json();
                        this.featured = data.slice(0, 3);
                    } catch (err) {
                        console.error("Fetch error: ", err);
                    }
                }
            }
        }

        function projectDetailApp() {
            return {
                projectId: null,
                project: null,
                markdownContent: '',
                loading: true,
                error: null,

                async init() {
                    this.projectId = parseInt(localStorage.getItem('emregoktas_portfolio_project_id'));

                    if (!this.projectId) {
                        this.error = "Project ID not found.";
                        this.loading = false;
                        return;
                    }

                    try {
                        // 1. Fetch JSON to get Project Meta
                        const res = await fetch(`/projects/projects.json?t=${new Date().getTime()}`);
                        const data = await res.json();
                        this.project = data.find(p => p.id === this.projectId);

                        if (!this.project) {
                            throw new Error("Project data not found in JSON.");
                        }

                        // 2. Fetch markdown if available
                        if (this.project.markdownFile) {
                            const mdRes = await fetch(this.project.markdownFile);
                            if (!mdRes.ok) throw new Error("Markdown file not found.");
                            const mdText = await mdRes.text();
                            this.markdownContent = marked.parse(mdText);
                        } else {
                            this.markdownContent = "<p class='text-gray-500 italic text-center'>Detailed documentation has not been added for this project yet.</p>";
                        }
                    } catch (err) {
                        console.error(err);
                        this.error = "Error loading data: " + err.message;
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }

        // Simple Path Router with SEO Titles
        const routes = {
            '/': { page: '/pages/home.html', title: 'Emre GOKTAS - Portfolio', desc: "Emre GOKTAS's portfolio. I design AI agents and automation systems." },
            '/home': { page: '/pages/home.html', title: 'Emre GOKTAS - Home', desc: "Emre GOKTAS's portfolio homepage." },
            '/about': { page: '/pages/about.html', title: 'Emre GOKTAS - About Me', desc: "Learn more about Emre GOKTAS, AI Agent Developer and Data Engineer." },
            '/projects': { page: '/pages/projects.html', title: 'Emre GOKTAS - Projects', desc: "View projects created by Emre GOKTAS." },
            '/blog': { page: '/pages/blog.html', title: 'Emre GOKTAS - Blog', desc: "Read technical articles and blog posts by Emre GOKTAS." }
        };

        function updateMetaDescription(desc) {
            let metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.setAttribute("content", desc);
            }
        }

        function handleRouting() {
            let path = window.location.pathname;
            if (path === '/') path = '/home'; // Default

            // Special case for project detail
            if (path.startsWith('/project/')) {
                const id = path.split('/').pop();
                localStorage.setItem('emregoktas_portfolio_project_id', id);
                document.title = 'Project Detail - Emre GOKTAS';
                updateMetaDescription('View details for this project.');
                htmx.ajax('GET', '/pages/project-detail.html', { target: '#main-content', swap: 'innerHTML transition:true' });
                return;
            }

            // Standard routes
            const route = routes[path];
            if (route) {
                document.title = route.title;
                updateMetaDescription(route.desc);
                htmx.ajax('GET', route.page, { target: '#main-content', swap: 'innerHTML transition:true' });
            } else {
                // Return 404 or home
                document.title = routes['/home'].title;
                updateMetaDescription(routes['/home'].desc);
                htmx.ajax('GET', '/pages/home.html', { target: '#main-content', swap: 'innerHTML transition:true' });
                window.history.replaceState({}, '', '/home');
            }
        }

        // Intercept link clicks globally for SPA
        document.addEventListener('click', e => {
            const link = e.target.closest('a');
            if (link && link.getAttribute('href') && link.getAttribute('href').startsWith('/')) {
                e.preventDefault();
                const path = link.getAttribute('href');
                window.history.pushState({}, '', path);
                handleRouting();
            }
        });

        // Register Alpine Components
        document.addEventListener('alpine:init', () => {
            Alpine.data('projectsApp', projectsApp);
            Alpine.data('blogLoader', blogLoader);
            Alpine.data('featuredApp', featuredApp);
            Alpine.data('projectDetailApp', projectDetailApp);
        });

        // Routing Listeners
        window.addEventListener('popstate', handleRouting);
        window.addEventListener('load', handleRouting);

        // Global HTMX Cache Busting for Development
        document.addEventListener('htmx:configRequest', function (evt) {
            // Append a timestamp to every HTMX request to prevent browser caching
            evt.detail.path = evt.detail.path + (evt.detail.path.includes('?') ? '&' : '?') + 't=' + new Date().getTime();
        });
    </script>
</head>

<body class="bg-darkBg text-gray-200 min-h-screen flex flex-col font-sans selection:bg-neonCyan selection:text-black">

                        </li>

                        <li><a href="/projects"

                        </li>
                        <li><a href="/blog"

                        </li>
                    </ul>
                </nav>

                <!-- Mobile Menu Button (Alpine) -->
                <div class="md:hidden" x-data="{ open: false }">
                    <button @click="open = !open" class="text-gray-300 hover:text-white focus:outline-none">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

                            <path x-show="open" style="display: none;" stroke-linecap="round" stroke-linejoin="round"

                        </svg>
                    </button>

                    <!-- Mobile Menu Dropdown -->
                    <div x-show="open" @click.away="open = false" style="display: none;"
                        class="absolute top-16 left-0 w-full bg-darkCard border-b border-gray-800 shadow-xl p-4 flex flex-col space-y-4">
                        <a href="/home" @click="open = false"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Home</a>
                        <a href="/about" @click="open = false"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">About
                            Me</a>
                        <a href="/projects" @click="open = false"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Projects</a>
                        <a href="/blog" @click="open = false"
                            class="block text-center hover:text-neonCyan transition-colors text-lg font-semibold uppercase">Blog</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area (SPA Target) -->
    <main id="main-content" class="flex-grow max-w-6xl w-full mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-10 page-transition">
        <!-- Default loader -->
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-neonCyan"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-6 text-center text-sm text-gray-500">
        <p>&copy; <span x-data x-text="new Date().getFullYear()"></span>
        </p>
    </footer>

</body>
