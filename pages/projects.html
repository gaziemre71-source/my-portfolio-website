<div class="max-w-6xl mx-auto py-10 animate-fade-in" x-data="projectsApp()">

    <div class="mb-10 text-center border-b border-gray-800 pb-6">
        <h2 class="text-4xl font-bold mb-4"><span class="text-neonCyan"></span>My Projects</h2>
        <p class="text-gray-400">Click to access all details of the project.</p>
    </div>

    <!-- Loading / Error States -->
    <div x-show="loading" class="flex justify-center py-20">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-neonCyan"></div>
    </div>
    <div x-show="error" class="bg-red-900/20 border border-red-500 text-red-400 p-4 rounded text-center" x-text="error"
        style="display: none;"></div>

    <!-- Projects Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" x-show="!loading && !error"
        style="display: none;">
        <template x-for="project in projects" :key="project.id">

            <div @click="openModal(project)"
                class="bg-darkCard rounded-xl overflow-hidden border border-gray-800 hover:border-neonCyan transition-all duration-300 group cursor-pointer shadow-lg hover:shadow-[0_0_15px_rgba(0,243,255,0.2)] flex flex-col h-full transform hover:-translate-y-1">

                <!-- Card Image -->
                <div class="h-48 bg-gray-900 relative overflow-hidden">
                    <img :src="project.screenshot" :alt="project.title"
                        class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500 group-hover:scale-105">

                    <!-- View Overlay -->
                    <div
                        class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span
                            class="text-neonCyan font-bold tracking-widest border border-neonCyan px-4 py-2 rounded-full backdrop-blur-sm">VIEW</span>
                    </div>
                </div>

                <!-- Card Content -->
                <div class="p-6 flex-grow flex flex-col justify-between">
                    <div>
                        <h3 class="text-xl font-bold mb-3 text-white group-hover:text-neonCyan transition-colors"
                            x-text="project.title"></h3>
                        <p class="text-gray-400 text-sm line-clamp-3 mb-4" x-text="project.description"></p>
                    </div>

                    <!-- Tags -->
                    <div class="flex flex-wrap gap-2 mt-auto">
                        <template x-for="tag in project.tags">
                            <span
                                class="text-xs font-semibold px-2 py-1 rounded bg-gray-800 text-neonPurple border border-gray-700"
                                x-text="tag"></span>
                        </template>
                    </div>
                </div>
            </div>

        </template>
    </div>

    <!-- Alpine.js Modal Overlay -->
    <div x-show="modalOpen" style="display: none;"
        class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto overflow-x-hidden p-4 sm:p-6"
        aria-labelledby="modal-title" role="dialog" aria-modal="true">

        <!-- Backdrop -->
        <div x-show="modalOpen" x-transition.opacity
            class="fixed inset-0 bg-black/90 backdrop-blur-sm transition-opacity" @click="closeModal()"></div>

        <!-- Modal Content panel -->
        <div x-show="modalOpen" x-transition:enter="ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200"
            x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
            x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
            class="relative transform overflow-hidden rounded-2xl bg-darkCard border border-neonCyan/50 text-left shadow-[0_0_30px_rgba(0,243,255,0.15)] transition-all sm:my-8 sm:w-full sm:max-w-4xl w-full z-10 flex flex-col max-h-[90vh]">

            <!-- Close Button -->
            <button aria-label="Close modal" @click="closeModal()"
                class="absolute top-4 right-4 text-gray-400 hover:text-neonCyan transition-colors bg-black/50 rounded-full p-2 hover:bg-black/80 z-20">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Modal Header -->
            <div class="px-6 pt-6 pb-4 border-b border-gray-800">
                <h3 class="text-3xl font-bold text-white mb-2" id="modal-title" x-text="activeProject?.title"></h3>
                <div class="flex flex-wrap gap-2">
                    <template x-for="tag in activeProject?.tags">
                        <span
                            class="text-xs font-semibold px-2 py-1 rounded bg-gray-800 text-neonPurple border border-gray-700"
                            x-text="tag"></span>
                    </template>
                </div>
            </div>

            <!-- Modal Body (Scrollable) -->
            <div class="px-6 py-6 overflow-y-auto flex-grow">

                <p class="text-gray-300 text-lg mb-8 leading-relaxed" x-text="activeProject?.description"></p>

                <!-- Media Toggles (Alpine.js state for slide show) -->
                <div class="mb-6 flex space-x-4 border-b border-gray-800 pb-2">
                    <button @click="mediaType = 'image'"
                        :class="{'text-neonCyan border-b-2 border-neonCyan': mediaType === 'image', 'text-gray-500 hover:text-gray-300': mediaType !== 'image'}"
                        class="pb-2 font-semibold uppercase tracking-wider text-sm transition-colors">Screenshot</button>

                    <template x-if="activeProject?.gif">
                        <button @click="mediaType = 'gif'"
                            :class="{'text-neonPurple border-b-2 border-neonPurple': mediaType === 'gif', 'text-gray-500 hover:text-gray-300': mediaType !== 'gif'}"
                            class="pb-2 font-semibold uppercase tracking-wider text-sm transition-colors">GIF
                            Preview</button>
                    </template>

                    <template x-if="activeProject?.video">
                        <button @click="mediaType = 'video'"
                            :class="{'text-red-500 border-b-2 border-red-500': mediaType === 'video', 'text-gray-500 hover:text-gray-300': mediaType !== 'video'}"
                            class="pb-2 font-semibold uppercase tracking-wider text-sm transition-colors">Video</button>
                    </template>

                </div>

                <!-- Dynamic Media Display based on selection -->
                <div
                    class="w-full mt-6 bg-black rounded-xl overflow-hidden border border-gray-800 flex justify-center items-center h-[400px]">

                    <div x-show="mediaType === 'image'" class="w-full h-full flex items-center justify-center p-4">
                        <img :src="activeProject?.screenshot"
                            class="max-w-full max-h-[360px] object-contain rounded-lg">
                    </div>

                    <div x-show="mediaType === 'gif'" class="w-full h-full flex items-center justify-center p-4"
                        style="display: none;">
                        <template x-if="activeProject?.gif">
                            <img :src="activeProject?.gif"
                                class="max-w-full max-h-[360px] object-contain rounded-lg border border-neonPurple/30 shadow-[0_0_15px_rgba(188,19,254,0.2)]">
                        </template>
                    </div>

                    <div x-show="mediaType === 'video'" class="w-full h-full flex items-center justify-center p-4"
                        style="display: none;">
                        <div class="w-full max-w-2xl aspect-video max-h-[360px]">
                            <!-- Using an iframe for youtube embed if available -->
                            <template x-if="activeProject?.video">
                                <iframe :src="activeProject?.video" class="w-full h-full rounded-lg" frameborder="0"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                    allowfullscreen></iframe>
                            </template>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>
